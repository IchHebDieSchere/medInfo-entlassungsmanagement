services:
  api:
    build:
      context: .
    init: true
    environment:
      NODE_ENV: development
      PORT: 3000
      TRUST_PROXY: 'false'
      MONGODB_URI: mongodb://mongodb:27017/med-info-fhir
      FHIR_BASE_URL: http://fhir:8080/fhir
      CORS_ORIGINS: http://localhost:3000
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 100
      AUTH_ENABLED: 'false'
    ports:
      - '3000:3000'
    depends_on:
      mongodb:
        condition: service_healthy
        restart: true
      fhir:
        condition: service_started
        restart: true
    restart: unless-stopped
    stop_grace_period: 15s

  mongodb:
    image: mongo:8.0
    volumes:
      - mongodb-data:/data/db
    ports:
      - '27017:27017'
    healthcheck:
      test:
        - CMD
        - mongosh
        - --quiet
        - --eval
        - "quit(db.adminCommand('ping').ok ? 0 : 1)"
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  fhir:
    image: hapiproject/hapi:v8.8.0-1
    environment:
      hapi.fhir.fhir_version: R4
      hapi.fhir.default_encoding: json
      hapi.fhir.narrative_enabled: 'true'
      hapi.fhir.enforce_referential_integrity_on_write: 'false'
    ports:
      - '8080:8080'
    restart: unless-stopped

volumes:
  mongodb-data:
